<!DOCTYPE html>
<html>
<head>
  <title>Mesin Slot Mahjong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      text-align: center;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #4ade80;
    }

    .balance {
      font-size: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(74, 222, 128, 0.1);
      border-left: 4px solid #4ade80;
      border-radius: 5px;
    }

    .slots-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 40px 0;
      perspective: 1000px;
    }

    .tile {
      width: 120px;
      height: 150px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      cursor: default;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      border: 3px solid #fbbf24;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      position: relative;
      overflow: hidden;
    }

    .tile::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
      pointer-events: none;
    }

    .tile.spin {
      animation: tileFlip 0.15s infinite;
    }

    @keyframes tileFlip {
      0%, 100% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
      50% { transform: rotateY(180deg) rotateX(10deg) scale(1.05); }
    }

    .tile-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .tile-icon {
      font-size: 60px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .tile-name {
      font-size: 10px;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tile-dragon { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
    .tile-phoenix { background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); }
    .tile-tiger { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }
    .tile-crane { background: linear-gradient(135deg, #06b6d4 0%, #0e7490 100%); }
    .tile-plum { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
    .tile-chrysanthemum { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }

    button {
      padding: 15px 30px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    #spinBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-width: 150px;
    }

    #spinBtn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    #spinBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #resetBtn {
      background: #ef4444;
      color: white;
      min-width: 120px;
    }

    #resetBtn:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      min-height: 25px;
      display: none;
      font-weight: bold;
    }

    .message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.jackpot {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border-left: 4px solid #22c55e;
    }

    .message.lose {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border-left: 4px solid #ef4444;
    }

    .message.win {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      border-left: 4px solid #3b82f6;
    }

    .info {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
    }

    .results-history {
      margin-top: 20px;
      max-height: 150px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
    }

    .history-item {
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 5px;
      font-size: 13px;
    }

    .tile-guide {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
    }

    .guide-item {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .guide-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎰 MESIN SLOT MAHJONG</h1>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">Putaran</div>
      <div class="stat-value" id="spins">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Kemenangan</div>
      <div class="stat-value" id="wins">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Tingkat Menang</div>
      <div class="stat-value" id="winRate">0%</div>
    </div>
  </div>

  <div class="balance">
    💰 Saldo: <span id="balance">1000</span> Koin
  </div>

  <div class="slots-container">
    <div class="tile tile-dragon" id="tile1">
      <div class="tile-content">
        <div class="tile-icon">🐉</div>
        <div class="tile-name">Naga</div>
      </div>
    </div>
    <div class="tile tile-phoenix" id="tile2">
      <div class="tile-content">
        <div class="tile-icon">🦅</div>
        <div class="tile-name">Phoenix</div>
      </div>
    </div>
    <div class="tile tile-tiger" id="tile3">
      <div class="tile-content">
        <div class="tile-icon">🐅</div>
        <div class="tile-name">Harimau</div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button id="spinBtn" onclick="spin()">🎯 PUTAR</button>
    <button id="resetBtn" onclick="reset()">🔄 RESET</button>
  </div>

  <div class="message" id="message"></div>

  <div class="tile-guide">
    <div class="guide-item"><span class="guide-icon">🐉</span> Naga +200</div>
    <div class="guide-item"><span class="guide-icon">🦅</span> Phoenix +50</div>
    <div class="guide-item"><span class="guide-icon">🐅</span> Harimau +50</div>
    <div class="guide-item"><span class="guide-icon">🦆</span> Crane +50</div>
    <div class="guide-item"><span class="guide-icon">🌸</span> Bunga +50</div>
    <div class="guide-item"><span class="guide-icon">🌼</span> Bunga Chrysant +50</div>
  </div>

  <div class="info">
    <p>✨ Tiga tile yang sama = JACKPOT!</p>
    <p>🏆 Jackpot: +200 Koin | Menang: +50 Koin | Kalah: -100 Koin</p>
  </div>

  <div class="results-history" id="history"></div>
</div>

<script>
const tiles = [
  { emoji: '🐉', name: 'Naga', value: 'dragon', class: 'tile-dragon' },
  { emoji: '🦅', name: 'Phoenix', value: 'phoenix', class: 'tile-phoenix' },
  { emoji: '🐅', name: 'Harimau', value: 'tiger', class: 'tile-tiger' },
  { emoji: '🦆', name: 'Crane', value: 'crane', class: 'tile-crane' },
  { emoji: '🌸', name: 'Bunga Plum', value: 'plum', class: 'tile-plum' },
  { emoji: '🌼', name: 'Chrysant', value: 'chrysanthemum', class: 'tile-chrysanthemum' }
];

let stats = {
  spins: 0,
  wins: 0,
  balance: 1000,
  history: []
};

let isSpinning = false;

function loadStats() {
  const saved = localStorage.getItem('slotStats');
  if (saved) {
    stats = JSON.parse(saved);
    updateDisplay();
  }
}

function saveStats() {
  localStorage.setItem('slotStats', JSON.stringify(stats));
}

function updateDisplay() {
  document.getElementById('spins').textContent = stats.spins;
  document.getElementById('wins').textContent = stats.wins;
  document.getElementById('balance').textContent = stats.balance;
  
  const winRate = stats.spins > 0 ? Math.round((stats.wins / stats.spins) * 100) : 0;
  document.getElementById('winRate').textContent = winRate + '%';
  
  updateHistory();
}

function updateHistory() {
  const historyDiv = document.getElementById('history');
  if (stats.history.length === 0) {
    historyDiv.innerHTML = '<p style="color: #666;">Belum ada riwayat</p>';
    return;
  }
  
  historyDiv.innerHTML = stats.history.slice(-5).reverse().map(item => 
    `<div class="history-item">${item}</div>`
  ).join('');
}

function getRandomTile() {
  return tiles[Math.floor(Math.random() * tiles.length)];
}

function createTileHTML(tile) {
  return `
    <div class="tile-content">
      <div class="tile-icon">${tile.emoji}</div>
      <div class="tile-name">${tile.name}</div>
    </div>
  `;
}

function spin() {
  if (isSpinning || stats.balance < 10) {
    if (stats.balance < 10) {
      showMessage('❌ Saldo tidak cukup! Reset permainan untuk bermain lagi.', 'lose');
    }
    return;
  }

  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  
  stats.balance -= 10;
  stats.spins += 1;

  const tileElements = [
    document.getElementById('tile1'),
    document.getElementById('tile2'),
    document.getElementById('tile3')
  ];

  tileElements.forEach(tile => tile.classList.add('spin'));

  const interval = setInterval(() => {
    tileElements.forEach(tile => {
      const randomTile = getRandomTile();
      tile.innerHTML = createTileHTML(randomTile);
      tile.className = `tile ${randomTile.class} spin`;
    });
  }, 100);

  setTimeout(() => {
    clearInterval(interval);
    tileElements.forEach(tile => tile.classList.remove('spin'));

    const results = tileElements.map(() => getRandomTile());

    results.forEach((result, index) => {
      tileElements[index].innerHTML = createTileHTML(result);
      tileElements[index].className = `tile ${result.class}`;
    });

    checkResult(results[0], results[1], results[2]);

    isSpinning = false;
    document.getElementById('spinBtn').disabled = false;
    
    saveStats();
    updateDisplay();
  }, 2000);
}

function checkResult(a, b, c) {
  const timestamp = new Date().toLocaleTimeString('id-ID');
  
  if (a.value === b.value && b.value === c.value) {
    stats.wins += 1;
    stats.balance += 200;
    showMessage(`🎉 JACKPOT! 3x ${a.name}! Anda menang 200 koin!`, 'jackpot');
    stats.history.push(`${timestamp} - JACKPOT! 3x ${a.name} (+200 koin)`);
  } else if ((a.value === b.value) || (b.value === c.value) || (a.value === c.value)) {
    stats.balance += 50;
    showMessage(`✨ Menang 50 koin! ${a.name} - ${b.name} - ${c.name}`, 'win');
    stats.history.push(`${timestamp} - Menang 50 koin`);
  } else {
    stats.balance -= 100;
    showMessage(`😅 Kalah! -100 koin. ${a.name} - ${b.name} - ${c.name}`, 'lose');
    stats.history.push(`${timestamp} - Kalah -100 koin`);
  }
}

function showMessage(text, type) {
  const messageDiv = document.getElementById('message');
  messageDiv.textContent = text;
  messageDiv.className = `message show ${type}`;
  
  setTimeout(() => {
    messageDiv.classList.remove('show');
  }, 3000);
}

function reset() {
  if (confirm('⚠️ Yakin ingin mereset semua data?')) {
    stats = {
      spins: 0,
      wins: 0,
      balance: 1000,
      history: []
    };
    localStorage.removeItem('slotStats');
    updateDisplay();
    showMessage('🔄 Data telah direset!', 'win');
  }
}

loadStats();
</script>

</body>
</html>
